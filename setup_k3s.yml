- name: install k3s on control nodes
  hosts: control_nodes
  become: true
  tasks:
    - name: install k3s
      ansible.builtin.shell: curl -sfL https://get.k3s.io | sh -
    - name: get k3s join token
      ansible.builtin.shell: cat /var/lib/rancher/k3s/server/node-token
      register: k3s_token
- name: join worker nodes to k3s cluster
  hosts: worker_nodes
  become: true
  tasks:
    - name: k3s worker nodes join cluster
      ansible.builtin.shell: curl -sfL https://get.k3s.io | K3S_URL=https://10.0.20.10:6443 K3S_TOKEN={{ hostvars[groups['control_nodes'][0]]['k3s_token']['stdout'] }} sh -