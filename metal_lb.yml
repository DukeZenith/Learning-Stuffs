  - name: Install MetalLB
    hosts: control_nodes
    become: true
    vars:
      kubeconfig_path: "/etc/rancher/k3s/k3s.yaml"
    tasks:
      - name: Add MetalLB Helm repository
        kubernetes.core.helm_repository:
          name: metal_lb
          repo_url: "https://metallb.github.io/metallb"
      - name: Install MetalLB chart
        kubernetes.core.helm:
          name: metallb
          chart_ref: metal_lb/metallb
          release_namespace: metallb-system
          create_namespace: true
        environment:
          K8S_AUTH_KUBECONFIG: "{{ kubeconfig_path }}"
      - name: MetalLB ip-address config
        kubernetes.core.k8s:
          state: present
          definition:
            apiVersion: metallb.io/v1beta1
            kind: IPAddressPool
            metadata:
              name: network-pool
              namespace: metallb-system
            spec:
              addresses:
                - "10.0.10.100-10.0.10.199"
        environment:
          K8S_AUTH_KUBECONFIG: "{{ kubeconfig_path }}"
      - name: MetalLB L2 Advertisement
        kubernetes.core.k8s:
          state: present
          definition:
            apiVersion: metallb.io/v1beta1
            kind: L2Advertisement
            metadata:
              name: lab-network-advertisement
              namespace: metallb-system
            spec:
              ipAddressPools:
                - network-pool
        environment:
          K8S_AUTH_KUBECONFIG: "{{ kubeconfig_path }}"
      - name: Create Nginx Deployment and Service
        kubernetes.core.k8s:
          state: present
          definition:
            - apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: nginx-deployment
              spec:
                replicas: 2
                selector:
                  matchLabels:
                    app: nginx
                template:
                  metadata:
                    labels:
                      app: nginx
                  spec:
                    containers:
                      - name: nginx
                        image: nginx:latest
                        ports:
                          - containerPort: 80
            - apiVersion: v1
              kind: Service
              metadata:
                name: nginx-service
                namespace: default
              spec:
                selector:
                  app: nginx
                ports:
                  - port: 80
                    targetPort: 80
                type: LoadBalancer
        environment:
          K8S_AUTH_KUBECONFIG: "{{ kubeconfig_path }}"
